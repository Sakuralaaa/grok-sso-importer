name: build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: grok-sso-importer-linux-amd64
            goos: linux
            goarch: amd64
            output: grok-sso-importer.so
          - os: ubuntu-24.04-arm
            artifact: grok-sso-importer-linux-arm64
            goos: linux
            goarch: arm64
            output: grok-sso-importer.so
          - os: windows-latest
            artifact: grok-sso-importer-windows-amd64
            goos: windows
            goarch: amd64
            output: grok-sso-importer.dll
          - os: macos-14
            artifact: grok-sso-importer-darwin-arm64
            goos: darwin
            goarch: arm64
            output: grok-sso-importer.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false
      - name: Build
        shell: bash
        run: CGO_ENABLED=1 go build -buildmode=c-shared -trimpath -ldflags='-s -w' -o '${{ matrix.output }}' .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package CPA assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          zip -j "release/grok-sso-importer_${version}_linux_amd64.zip" artifacts/grok-sso-importer-linux-amd64/grok-sso-importer.so
          zip -j "release/grok-sso-importer_${version}_linux_arm64.zip" artifacts/grok-sso-importer-linux-arm64/grok-sso-importer.so
          zip -j "release/grok-sso-importer_${version}_windows_amd64.zip" artifacts/grok-sso-importer-windows-amd64/grok-sso-importer.dll
          zip -j "release/grok-sso-importer_${version}_darwin_arm64.zip" artifacts/grok-sso-importer-darwin-arm64/grok-sso-importer.dylib
          cd release
          sha256sum *.zip > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
